name: Build and Push Docker Image to Azure Blob Storage
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Read image name from README.md
      - name: Read image name from README.md
        id: read_image_name
        run: |
          IMAGE_NAME=$(grep -v '^#' README.md | grep -v '^\s*$' | head -n 1)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_OUTPUT
        shell: bash

      # Step 3: Sanitize image name, build, save, and upload
      - name: Build and upload Docker image
        run: |
          # Sanitize name and build tag
          IMAGE_NAME_SANITIZED=$(echo "${{ steps.read_image_name.outputs.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          TIME_STAMP=$(date -u +"%Y-%m-%d-%H-%M-%S")
          IMAGE_NAME_TAG="${IMAGE_NAME_SANITIZED}:${TIME_STAMP}"
          echo "Image tag: $IMAGE_NAME_TAG"

          # Build the Docker image
          docker build -t "$IMAGE_NAME_TAG" .

          # Save as tarball
          IMAGE_FILE_NAME="${IMAGE_NAME_SANITIZED}_${TIME_STAMP}.tar"
          docker save -o "$IMAGE_FILE_NAME" "$IMAGE_NAME_TAG"

          # Upload to Azure Blob Storage using SAS token (no --auth-mode when using SAS)
          az storage blob upload \
            --account-name "${{ secrets.AZURE_ACCOUNT_NAME }}" \
            --container-name "${{ secrets.AZURE_CONTAINER_NAME }}" \
            --name "$IMAGE_FILE_NAME" \
            --file "$IMAGE_FILE_NAME" \
            --sas-token "${{ secrets.AZURE_BLOB_SAS_TOKEN }}" \
            --overwrite
        shell: bash
