name: Build and Push Docker Image to GitHub Container Registry
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Read image name from README.md
        id: read_image_name
        run: |
          # Find first non-header line in README.md
          IMAGE_NAME=$(grep -v '^#' README.md | grep -v '^\s*$' | head -n 1)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
        shell: bash

      - name: Sanitize image name and add timestamp
        run: |
          # Convert to lowercase and replace spaces with -
          IMAGE_NAME_SANITIZED=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          # Add UTC timestamp
          TIME_STAMP=$(date -u +"%Y-%m-%d-%H-%M-%S")
          IMAGE_NAME_TAG="${IMAGE_NAME_SANITIZED}:${TIME_STAMP}"
          echo "IMAGE_NAME_TAG=$IMAGE_NAME_TAG" >> $GITHUB_ENV
          echo "Sanitized image with timestamp: $IMAGE_NAME_TAG"
        shell: bash

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME_TAG .
        shell: bash

      - name: Push Docker image to GitHub Container Registry
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME_TAG
        shell: bash
